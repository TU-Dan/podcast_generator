<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库</title>
    <style>
        :root {
            --bg: #0d0d14;
            --surface: #16161f;
            --surface-2: #1e1e2d;
            --border: rgba(255,255,255,0.07);
            --accent: #7c5cfc;
            --accent-2: #5b8dee;
            --accent-glow: rgba(124,92,252,0.2);
            --text: #e8e8f0;
            --text-muted: #7a7a9a;
            --success: #34d399;
            --error: #f87171;
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,92,252,0.1) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(91,141,238,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar */
        .layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            padding: 0 4px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-icon svg { width: 16px; height: 16px; fill: white; }

        .logo-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: all 0.15s;
            text-decoration: none;
        }

        .nav-item:hover { background: var(--surface-2); color: var(--text); }

        .nav-item.active {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

        .nav-badge {
            margin-left: auto;
            font-size: 11px;
            background: var(--surface-2);
            color: var(--text-muted);
            padding: 1px 6px;
            border-radius: 10px;
        }

        .nav-item.active .nav-badge {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .tags-section {
            margin-top: 8px;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .tags-section::-webkit-scrollbar { width: 3px; }
        .tags-section::-webkit-scrollbar-track { background: transparent; }
        .tags-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .tag-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: all 0.15s;
        }

        .tag-nav:hover { background: var(--surface-2); color: var(--text); }

        .tag-nav.active {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .tag-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .tag-nav.active .tag-dot { background: var(--accent); }
        .tag-nav.active span { color: var(--accent); }

        .sidebar-footer {
            margin-top: auto;
        }

        .btn-new {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .btn-new:hover { opacity: 0.9; }
        .btn-new svg { width: 14px; height: 14px; }

        /* Main content */
        .main {
            flex: 1;
            padding: 32px 36px;
            min-width: 0;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .search-wrap {
            flex: 1;
            max-width: 420px;
            position: relative;
        }

        .search-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 15px;
            height: 15px;
        }

        .search-input {
            width: 100%;
            padding: 9px 14px 9px 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent); }

        .stats {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-left: auto;
        }

        .stat-num { color: var(--text); font-weight: 600; }

        /* Empty state */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 80px 0;
            color: var(--text-muted);
        }

        .empty svg { opacity: 0.25; width: 48px; height: 48px; }
        .empty p { font-size: 14px; }

        /* Article grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: rgba(124,92,252,0.4);
            transform: translateY(-2px);
        }

        .card-thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: var(--surface-2);
            display: block;
        }

        .card-thumb-placeholder {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, var(--surface-2), #12121a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-thumb-placeholder svg { width: 36px; height: 36px; opacity: 0.15; }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .badge-url     { background: rgba(91,141,238,0.15); color: #5b8dee; }
        .badge-youtube { background: rgba(248,113,113,0.15); color: #f87171; }
        .badge-pdf     { background: rgba(251,191,36,0.15);  color: #fbbf24; }
        .badge-txt     { background: rgba(52,211,153,0.15);  color: #34d399; }
        .badge-imported { background: rgba(124,92,252,0.15); color: #7c5cfc; }

        .card-date {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-summary {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .card-word-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-read-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--accent-glow);
            transition: background 0.15s;
        }

        .card-read-link:hover { background: rgba(124,92,252,0.3); }
        .card-read-link svg { width: 11px; height: 11px; }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 4px;
        }

        .tag-chip {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--surface-2);
            color: var(--text-muted);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .tag-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 60px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 1 0 4 0V5a2 2 0 0 0-2-2zm-7 8h2a7 7 0 0 0 14 0h2a9 9 0 0 1-8 8.94V22h-2v-2.06A9 9 0 0 1 5 11z"/></svg>
            </div>
            <span class="logo-text">知识库</span>
        </div>

        <div class="nav-label">标签</div>
        <button class="nav-item active" id="tag-all" onclick="clearTags()">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            全部
            <span class="nav-badge" id="count-all">—</span>
        </button>

        <div class="tags-section" id="tags-nav">
            <div style="padding:8px 10px;font-size:12px;color:var(--text-muted)">加载中...</div>
        </div>

        <div class="sidebar-footer">
            <a href="/generate" class="btn-new">
                <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建播客
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <div class="search-wrap">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input class="search-input" type="text" placeholder="搜索标题或摘要..." id="search-input" oninput="onSearch(this.value)">
            </div>
            <div class="stats">
                共 <span class="stat-num" id="result-count">—</span> 篇
            </div>
        </div>

        <div id="content">
            <div class="loading"><div class="spinner"></div> 加载中...</div>
        </div>
    </main>
</div>

<script>
    let searchTimer = null;
    let selectedTags = new Set();
    let totalCount = 0;

    const SOURCE_LABELS = {
        url: '网页', youtube: 'YouTube', pdf: 'PDF', txt: '文本', script: '导入', imported: '导入'
    };

    function formatDate(iso) {
        const d = new Date(iso);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function badgeClass(type) {
        const map = { url:'badge-url', youtube:'badge-youtube', pdf:'badge-pdf', txt:'badge-txt', script:'badge-imported', imported:'badge-imported' };
        return map[type] || 'badge-imported';
    }

    function renderCards(articles) {
        const el = document.getElementById('content');
        document.getElementById('result-count').textContent = articles.length;
        if (!articles.length) {
            el.innerHTML = `<div class="empty">
                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 13h6m-3-3v6m5 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/></svg>
                <p>暂无内容，<a href="/generate" style="color:var(--accent)">去生成一期</a></p>
            </div>`;
            return;
        }
        el.innerHTML = `<div class="grid">${articles.map(cardHTML).join('')}</div>`;
    }

    function cardHTML(a) {
        const thumb = a.image_url
            ? `<img class="card-thumb" src="${a.image_url}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : '';
        const placeholder = `<div class="card-thumb-placeholder" ${a.image_url ? 'style="display:none"' : ''}>
            <svg fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>`;
        const wc = a.word_count ? `<span class="card-word-count">${a.word_count.toLocaleString()} 字</span>` : `<span></span>`;
        const readLink = a.article_md_path
            ? `<a class="card-read-link" href="/article/${a.id}">阅读<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>`
            : '';
        let tags = [];
        try { tags = JSON.parse(a.tags || '[]'); } catch(e) {}
        const tagsHtml = tags.length
            ? `<div class="card-tags">${tags.map(t => {
                const active = selectedTags.has(t) ? 'style="border-color:var(--accent);color:var(--accent)"' : '';
                return `<span class="tag-chip" ${active} onclick="toggleTagFromCard(event,'${t}')">${t}</span>`;
              }).join('')}</div>`
            : '';
        return `<div class="card">
            ${thumb}${placeholder}
            <div class="card-body">
                <div class="card-meta">
                    <span class="badge ${badgeClass(a.source_type)}">${SOURCE_LABELS[a.source_type] || a.source_type || '—'}</span>
                    <span class="card-date">${formatDate(a.created_at)}</span>
                </div>
                <div class="card-title">${a.title}</div>
                <div class="card-summary">${a.summary || ''}</div>
                ${tagsHtml}
                <div class="card-footer">${wc}${readLink}</div>
            </div>
        </div>`;
    }

    function renderTagNav(tags) {
        const nav = document.getElementById('tags-nav');
        if (!tags.length) {
            nav.innerHTML = `<div style="padding:8px 10px;font-size:12px;color:var(--text-muted)">暂无标签</div>`;
            return;
        }
        nav.innerHTML = tags.filter(({ count }) => count >= 2).map(({ tag, count }) => {
            const active = selectedTags.has(tag) ? 'active' : '';
            return `<button class="tag-nav ${active}" onclick="toggleTag('${tag}')" data-tag="${tag}">
                <span class="tag-dot"></span>
                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tag}</span>
                <span style="font-size:11px;color:var(--text-muted);margin-left:4px;flex-shrink:0">${count}</span>
            </button>`;
        }).join('');
    }

    function updateAllBtn() {
        const btn = document.getElementById('tag-all');
        btn.classList.toggle('active', selectedTags.size === 0);
        document.getElementById('count-all').textContent = totalCount;
    }

    async function loadTags() {
        const res = await fetch('/api/tags');
        const tags = await res.json();
        renderTagNav(tags);
    }

    async function load() {
        try {
            const params = new URLSearchParams();
            const q = document.getElementById('search-input').value.trim();
            if (q) params.set('q', q);
            if (selectedTags.size) params.set('tags', [...selectedTags].join(','));
            const res = await fetch('/api/articles?' + params);
            const data = await res.json();
            totalCount = Object.values(data.counts).reduce((s, n) => s + n, 0);
            renderCards(data.articles);
            updateAllBtn();
        } catch (e) {
            document.getElementById('content').innerHTML = `<div class="empty"><p style="color:var(--error)">加载失败：${e.message}</p></div>`;
        }
    }

    function toggleTag(tag) {
        if (selectedTags.has(tag)) {
            selectedTags.delete(tag);
        } else {
            selectedTags.add(tag);
        }
        // Update sidebar button states
        document.querySelectorAll('.tag-nav').forEach(btn => {
            btn.classList.toggle('active', selectedTags.has(btn.dataset.tag));
        });
        updateAllBtn();
        load();
    }

    function clearTags() {
        selectedTags.clear();
        document.querySelectorAll('.tag-nav').forEach(btn => btn.classList.remove('active'));
        updateAllBtn();
        load();
    }

    function toggleTagFromCard(e, tag) {
        e.preventDefault();
        e.stopPropagation();
        toggleTag(tag);
        // Scroll the sidebar tag into view
        const btn = document.querySelector(`.tag-nav[data-tag="${tag}"]`);
        if (btn) btn.scrollIntoView({ block: 'nearest' });
    }

    function onSearch(val) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(load, 300);
    }

    loadTags();
    load();
</script>
</body>
</html>
